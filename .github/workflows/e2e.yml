name: E2E

on:
  # Vercel reports deployments via the GitHub Deployments API; this fires
  # after every successful preview or production deploy.
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to test (defaults to production)'
        required: false
        default: 'https://aviously.me'

jobs:
  e2e:
    if: github.event_name == 'workflow_dispatch' || github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium webkit

      - name: Run e2e tests
        run: bunx playwright test
        env:
          # Production deploys get the clean domain; previews get their unique URL.
          BASE_URL: ${{ github.event.inputs.url || (github.event.deployment_status.environment == 'Production' && 'https://aviously.me') || github.event.deployment_status.environment_url }}
          # Gets CI past Vercel Deployment Protection on preview URLs.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
